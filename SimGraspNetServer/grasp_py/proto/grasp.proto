syntax = "proto3";

package grasp;

service GraspService {

    // 1. zhua pvc paomian
    // 2. zhua pvc 
    // 3. zhua paomian
    // #抓PVC和泡棉
    rpc GraspPVCandEVA (DefaultRequest) returns (DefaultResponse);
    // #单抓PVC
    rpc GraspPVC (DefaultRequest) returns (DefaultResponse);
    // #单抓泡棉
    rpc GraspEVA (DefaultRequest) returns (DefaultResponse);
    // 紧急停止
    rpc EmergencyStop (DefaultRequest) returns (DefaultResponse);
    // 回零
    rpc ZeroBack (DefaultRequest) returns (DefaultResponse);
    // 计算 PVC 上料途径点
    rpc ProcessPVC (DefaultRequest) returns (DefaultResponse);
    // 计算 EVA 上料途径点
    rpc ProcessEVA (DefaultRequest) returns (DefaultResponse);
    // 采集图像数据
    rpc CaptureImage (DefaultRequest) returns (DefaultResponse);
    // PVC 管上料
    rpc LoadPVC (DefaultRequest) returns (DefaultResponse);
    // EVA 管上料
    rpc LoadEVA (DefaultRequest) returns (DefaultResponse);
}

message DefaultRequest {
    int32 defaultReq = 1;
}

message DefaultResponse {
    int32 errorcode = 1;
    string message = 2;
}

